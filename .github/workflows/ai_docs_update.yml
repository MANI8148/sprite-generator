name: AI Docs Update

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * 1'  # weekly

permissions:
  contents: write
  pull-requests: write

jobs:
  ai-docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install deps
        run: pip install huggingface_hub

      - name: Generate metrics summary
        run: |
          python -c "
import json
import os

# Check if eval results exist
if os.path.exists('eval/eval_results.json'):
    with open('eval/eval_results.json') as f:
        metrics = json.load(f)
else:
    metrics = {'status': 'no results yet'}

# Generate README update
update = f'''## Latest Evaluation Results

{json.dumps(metrics, indent=2)}

*Auto-generated by AI Docs Update workflow.*
'''
with open('eval/latest_metrics.md', 'w') as f:
    f.write(update)
print('Metrics summary generated')
"

      - name: Create PR with docs update
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"

          BRANCH="docs/auto-update-$(date +%s)"
          git checkout -b "$BRANCH"

          git add eval/latest_metrics.md README.md 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git commit -m "Auto-update docs and metrics [skip ci]"
          git push origin "$BRANCH"

          gh pr create \
            --title "Auto-update docs and metrics" \
            --body "Automated documentation update with latest evaluation metrics." \
            --base main \
            --head "$BRANCH"
