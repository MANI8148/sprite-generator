name: Data Pipeline

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * 0'  # weekly

jobs:
  data-pipeline:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install deps
        run: |
          pip install -q -r requirements.txt
          pip install -q requests imagehash torchvision

      - name: Scrape Kenney.nl
        run: python data/scripts/scrape_sources.py --output data/raw

      - name: Scrape OpenGameArt.org (CC0)
        run: python data/scripts/scrape_oga.py --output data/raw --max-packs 50
        continue-on-error: true

      - name: Scrape Itch.io (CC0 bundles)
        run: python data/scripts/scrape_itchio.py --output data/raw
        continue-on-error: true

      - name: Clean and normalize
        run: |
          python data/scripts/clean_normalize.py \
            --input data/raw --output data/processed \
            --canvas-size 32 --palette-size 24

      - name: AI Captioning
        run: |
          python data/scripts/caption_ai.py \
            --input data/processed --output data/processed/metadata_labeled.json \
            --hf-token ${{ secrets.HF_TOKEN }}

      - name: Augment dataset (4x)
        run: |
          python data/scripts/augment_dataset.py \
            --input data/processed --output data/augmented \
            --copies 4

      - name: Push to HF Datasets
        run: |
          python data/scripts/push_to_hf.py \
            --input data/augmented \
            --repo ${{ vars.HF_DATASET_REPO || 'darklord8777/sprites' }} \
            --token ${{ secrets.HF_TOKEN }}
