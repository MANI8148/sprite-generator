name: Trigger Kaggle Training

on:
  workflow_dispatch:
    inputs:
      epochs_vqvae:
        description: 'VQ-VAE epochs'
        default: '50'
      epochs_transformer:
        description: 'Transformer epochs'
        default: '50'
  push:
    tags:
      - 'train-*'

jobs:
  trigger-kaggle:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Kaggle CLI
        run: |
          pip install kaggle
          mkdir -p ~/.kaggle
          echo '{"username":"${{ secrets.KAGGLE_USERNAME }}","key":"${{ secrets.KAGGLE_KEY }}"}' > ~/.kaggle/kaggle.json
          chmod 600 ~/.kaggle/kaggle.json

      - name: Inject GH_TOKEN into notebook and push
        run: |
          python3 -c "
import json
with open('kaggle/kaggle_train_kernel.ipynb') as f:
    nb = json.load(f)
# Update the clone cell to include token
for cell in nb['cells']:
    src = ''.join(cell['source'])
    if 'GH_TOKEN' in src and '{GH_TOKEN}' in src:
        cell['source'] = [s.replace('{GH_TOKEN}', '${{ github.token }}') for s in cell['source']]
with open('kaggle/kaggle_train_kernel.ipynb', 'w') as f:
    json.dump(nb, f, indent=1)
print('Token injected')
"
          kaggle kernels push -p kaggle/

      - name: Set kernel ID
        run: echo "KERNEL_ID=potlamanikanta/sprite-generator-training" >> $GITHUB_ENV

      - name: Wait for training to complete
        run: |
          echo "Waiting for $KERNEL_ID..."
          while true; do
            STATUS=$(kaggle kernels status "$KERNEL_ID" 2>/dev/null)
            echo "$STATUS"
            if echo "$STATUS" | grep -q "complete"; then
              echo "Training complete!"
              break
            fi
            if echo "$STATUS" | grep -q "error"; then
              echo "Training failed!"
              kaggle kernels output "$KERNEL_ID" -p /tmp/kaggle-output
              exit 1
            fi
            sleep 60
          done

      - name: Download kernel output
        run: |
          kaggle kernels output "$KERNEL_ID" -p /tmp/kaggle-output

      - name: Verify training_complete marker on HF
        run: |
          pip install huggingface_hub
          python3 -c "
          from huggingface_hub import HfApi
          api = HfApi()
          repo = 'darklord8777/sprite-generator-model'
          token = '${{ secrets.HF_TOKEN }}'
          try:
              data = api.hf_hub_download(repo, 'training_complete.json', token=token)
              with open(data) as f:
                  import json
                  status = json.load(f)
                  assert status.get('status') == 'complete', 'Training not marked complete'
                  print('Training verified: OK')
          except Exception as e:
              print(f'Verification failed: {e}')
              exit(1)
          "
